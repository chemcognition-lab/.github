<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 220" width="100%" height="auto">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,400;0,700;1,400;1,700&amp;family=Spectral:ital,wght@0,400;0,700;1,400;1,700&amp;display=swap');
    .title {
      font-family: 'Spectral', Georgia, serif;
      font-size: 38px;
      fill: #a41034;
      font-weight: 400;
    }
    .body-text {
      font-family: 'Fira Sans', 'Roboto', sans-serif;
      font-size: 22px;
      font-style: italic;
      fill: #1c1c1c;
    }
    .highlight {
      font-weight: bold;
      font-style: italic;
      fill: #276419;
    }
    @media (prefers-color-scheme: dark) {
      .body-text {
        fill: #f9f9f9;
      }
    }
  </style>
  
  <!-- Title/Header -->
  <text x="50%" y="60" text-anchor="middle" class="title">Our mission is a human-centered one ...</text>
  
  <!-- Body text centered and styled -->
  <text x="50%" y="125" text-anchor="middle" class="body-text">
    Designing computer-robotic systems that <tspan class="highlight">augment our human</tspan>
  </text>
  <text x="50%" y="160" text-anchor="middle" class="body-text">
    <tspan class="highlight">capacity</tspan> for engineering and optimizing molecular systems,
  </text>
  <text x="50%" y="195" text-anchor="middle" class="body-text">
    reactions, and processes.
  </text>
</svg>
